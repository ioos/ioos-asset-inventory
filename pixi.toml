nbclassic = ">=1.3.3,<2"
matplotlib-base = ">=3.10.8,<4"
netcdf4 = ">=1.7.4,<2"
openpyxl = ">=3.1.5,<4"
pandas = ">=2.3.3,<3"
python = "3.14.*"
xarray = ">=2026.2.0,<2027"
pyjanitor = ">=0.32.20,<0.33"
