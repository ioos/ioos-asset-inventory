[workspace]
authors = ["Filipe Fernandes <ocefpaf@gmail.com>"]
channels = ["conda-forge"]
name = "ioos-asset-inventory"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
notebook = "jupyter nbclassic"

[dependencies]
cf-units = ">=3.3.1,<4"
